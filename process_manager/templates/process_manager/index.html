{% extends "main/base.html" %}
{% block title %}
  Home
{% endblock title %}
{% block extra_css %}
  <style>
    #hide-messages-button {
      float: right;
    }
    #message-list {
      max-height: 80vh;
      overflow-y: auto;
    }
  </style>
{% endblock extra_css %}
{% block extra_js %}
  <script language="JavaScript">
        function toggle(source) {
            const checkboxes = document.getElementsByName('select');
            for (const checkbox of checkboxes) {
                checkbox.checked = source.checked;
            }
            updateButtonState();
        }

        function updateButtonState() {
            const checkboxes = document.getElementsByName('select');
            const buttons = [
                document.getElementById('restartButton'),
                document.getElementById('flushButton'),
                document.getElementById('killButton')
            ];
            const anyChecked = Array.from(checkboxes).some(checkbox => checkbox.checked);
            buttons.forEach(button => button.disabled = !anyChecked);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const checkboxes = document.getElementsByName('select');
            checkboxes.forEach(checkbox => checkbox.addEventListener('change', updateButtonState));
            updateButtonState();
        });
  </script>
{% endblock extra_js %}
{% block content %}
  <div class="row">
    <div class="col">
      <form method="post" action="{% url 'process_manager:process_action' %}">
        {% csrf_token %}
        <a href="{% url 'process_manager:boot_process' %}"
           class="btn btn-primary">Boot</a>
        {% if perms.main.can_modify_processes %}
          <input type="submit"
                 value="Restart"
                 class="btn btn-success"
                 name="action"
                 id="restartButton"
                 onclick="return confirm('Restart selected processes?')">
          <input type="submit"
                 value="Flush"
                 class="btn btn-warning"
                 name="action"
                 id="flushButton"
                 onclick="return confirm('Flush selected processes?')">
          <input type="submit"
                 value="Kill"
                 class="btn btn-danger"
                 name="action"
                 id="killButton"
                 onclick="return confirm('Kill selected processes?')">
        {% endif %}
        <button id="show-messages-button"
                type="button"
                class="btn btn-info"
                _="on load hide me on click hide me show #message-panel">Show Messages</button>
        <p>&nbsp;</p>
        <input class="form-control"
               type="search"
               name="search"
               placeholder="Search..."
               hx-get="{% url 'process_manager:process_table' %}"
               hx-trigger="input changed delay:500ms, every 1s"
               hx-target="div.table-container">
        <div id="table-container"
             hx-get="{% url 'process_manager:process_table' %}"
             hx-trigger="load"></div>
      </form>
    </div>
    <div class="col" id="message-panel">
      <div class="card">
        <div class="card-header">
          Messages
          <button id="hide-messages-button"
                  type="button"
                  class="btn-close"
                  aria-label="Hide Messages"
                  _="on click hide #message-panel show #show-messages-button"></button>
          <input class="form-control"
                 type="search"
                 name="search"
                 placeholder="Search..."
                 hx-get="{% url 'process_manager:messages' %}"
                 hx-trigger="input changed delay:500ms, every 1s"
                 hx-target="#message-list">
        </div>
        <div id="message-list"
             class="card-body"
             hx-get="{% url 'process_manager:messages' %}"
             hx-trigger="load"></div>
      </div>
    </div>
  </div>
{% endblock content %}
